kind = "web"
previewPath = "/"
title = "ПЕРИМЕТР"
version = "1.0.0"
id = "artifacts/perimetr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20715

[services.development]
run = "pnpm --filter @workspace/perimetr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perimetr", "run", "build" ]
publicDir = "artifacts/perimetr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20715"
BASE_PATH = "/"
